name: Build and Release IPK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        default: '2.0.0'
      release_description:
        description: 'Release description'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      TARGET: x86/64
      PACKAGE_NAME: luci-app-homeproxy
      SING_BOX_VERSION: 1.13.13
      SDK_URL: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
      OPENWRT_BASE_URL: https://downloads.openwrt.org/releases/24.10.0

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl xz-utils zstd zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail

          SDK_FILE="${SDK_URL##*/}"

          if [ -z "$SDK_FILE" ]; then
            echo "Invalid OpenWrt SDK URL."
            exit 1
          fi

          curl -fsSLO "$SDK_URL"
          mkdir -p sdk
          tar --strip-components=1 -C sdk -xaf "$SDK_FILE"

      - name: Prepare package
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='sdk' \
            --exclude='artifacts' \
            --exclude='openwrt-sdk-*.tar.*' \
            ./ ./sdk/package/${PACKAGE_NAME}/

          find ./sdk/package -type d -name sing-box -prune -exec rm -rf {} +
          if [ -d ./sdk/feeds ]; then
            find ./sdk/feeds -type d -name sing-box -prune -exec rm -rf {} +
          fi
          mkdir -p ./sdk/package/sing-box
          rsync -a ./.github/openwrt-packages/sing-box/ ./sdk/package/sing-box/

      - name: Update feeds
        working-directory: sdk
        run: |
          set -euo pipefail

          ./scripts/feeds update -a
          ./scripts/feeds install -a
          if [ -d ./package/feeds ]; then
            find ./package/feeds -type d -name sing-box -prune -exec rm -rf {} +
          fi

      - name: Compile IPK packages
        working-directory: sdk
        run: |
          set -euo pipefail

          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=m" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=m" >> .config
          make defconfig
          make package/sing-box/compile V=s -j"$(nproc)"
          make package/${PACKAGE_NAME}/compile V=s -j"$(nproc)"

          mkdir -p ../artifacts
          HOMEPROXY_IPK="$(find bin/packages -type f -name "${PACKAGE_NAME}_*.ipk" | head -n1)"
          SING_BOX_IPK="$(find bin/packages -type f -name "sing-box_${SING_BOX_VERSION}-*.ipk" | head -n1)"
          I18N_IPK="$(find bin/packages -type f -name "luci-i18n-homeproxy-zh-cn_*.ipk" | head -n1)"

          if [ -z "$HOMEPROXY_IPK" ]; then
            echo "No luci-app-homeproxy IPK file produced."
            exit 1
          fi
          if [ -z "$SING_BOX_IPK" ]; then
            echo "No sing-box IPK file produced."
            exit 1
          fi
          if [ -z "$I18N_IPK" ]; then
            echo "No luci-i18n-homeproxy-zh-cn IPK file produced."
            exit 1
          fi

          cp "$HOMEPROXY_IPK" "../artifacts/${PACKAGE_NAME}_${{ inputs.release_tag }}.ipk"
          cp "$SING_BOX_IPK" "../artifacts/sing-box_${SING_BOX_VERSION}_x86_64.ipk"
          cp "$I18N_IPK" "../artifacts/luci-i18n-homeproxy-zh-cn_${{ inputs.release_tag }}.ipk"

      - name: Download dependency.ipk
        run: |
          set -euo pipefail

          mkdir -p artifacts/deps package-index

          REPOS="
          ${OPENWRT_BASE_URL}/targets/x86/64/packages
          ${OPENWRT_BASE_URL}/packages/x86_64/base
          ${OPENWRT_BASE_URL}/packages/x86_64/packages
          ${OPENWRT_BASE_URL}/packages/x86_64/luci
          ${OPENWRT_BASE_URL}/packages/x86_64/routing
          ${OPENWRT_BASE_URL}/packages/x86_64/telephony
          "

          fetch_index() {
            local repo="$1"
            local name
            name="$(printf '%s' "$repo" | sed 's#https\?://##; s#[/:]#_#g')"
            if [ ! -f "package-index/${name}.Packages" ]; then
              curl -fsSL "$repo/Packages.gz" | gzip -dc > "package-index/${name}.Packages"
            fi
          }

          package_field() {
            local index="$1"
            local package="$2"
            local field="$3"
            awk -v pkg="$package" -v field="$field" '
              BEGIN { RS=""; FS="\n" }
              $0 ~ "(^|\n)Package: " pkg "(\n|$)" {
                for (i = 1; i <= NF; i++) {
                  if ($i ~ "^" field ": ") {
                    sub("^" field ": ", "", $i)
                    print $i
                    exit
                  }
                }
              }
            ' "$index"
          }

          normalize_depends() {
            tr ',' '\n' |
              sed -E 's/^\s+//; s/\s+$//; s/ \(.+\)//; s/\|.*$//' |
              grep -E '^[A-Za-z0-9_.+-]+$' |
              grep -Ev '^(libc|kernel)$' || true
          }

          download_package() {
            local package="$1"
            local repo index filename deps dep

            case " $VISITED " in
              *" $package "*) return 0 ;;
            esac
            VISITED="$VISITED $package"

            for repo in $REPOS; do
              fetch_index "$repo"
              index="package-index/$(printf '%s' "$repo" | sed 's#https\?://##; s#[/:]#_#g').Packages"
              filename="$(package_field "$index" "$package" "Filename")"
              if [ -n "$filename" ]; then
                echo "Downloading dependency: $package"
                curl -fsSL "$repo/$filename" -o "artifacts/deps/${filename##*/}"
                deps="$(package_field "$index" "$package" "Depends")"
                if [ -n "$deps" ]; then
                  printf '%s\n' "$deps" | normalize_depends | while IFS= read -r dep; do
                    [ -z "$dep" ] || download_package "$dep"
                  done
                fi
                return 0
              fi
            done

            echo "Warning: dependency package not found in OpenWrt repositories: $package"
          }

          VISITED=" sing-box ${PACKAGE_NAME} "
          for package in \
            firewall4 \
            dnsmasq-full \
            ip-full \
            kmod-tun \
            kmod-nft-tproxy \
            ca-bundle \
            curl \
            jsonfilter \
            ucode-mod-digest \
            ucode-mod-fs \
            ucode-mod-math \
            ucode-mod-ubus \
            ucode-mod-uci \
            luci-i18n-base-zh-cn; do
            download_package "$package"
          done

      - name: Create release package
        env:
          RELEASE_VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          BUNDLE_DIR="homeproxy-${RELEASE_VERSION}-x86_64"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/packages/deps"

          cp artifacts/${PACKAGE_NAME}_${RELEASE_VERSION}.ipk "$BUNDLE_DIR/packages/"
          cp artifacts/luci-i18n-homeproxy-zh-cn_${RELEASE_VERSION}.ipk "$BUNDLE_DIR/packages/"
          cp artifacts/sing-box_${SING_BOX_VERSION}_x86_64.ipk "$BUNDLE_DIR/packages/"
          if compgen -G "artifacts/deps/*.ipk" >/dev/null; then
            cp artifacts/deps/*.ipk "$BUNDLE_DIR/packages/deps/"
          fi

          {
            echo '#!/bin/sh'
            echo 'set -eu'
            echo ''
            echo 'cd "$(dirname "$0")"'
            echo ''
            echo 'echo "Installing dependency packages..."'
            echo 'if ls packages/deps/*.ipk >/dev/null 2>&1; then'
            echo '  opkg install packages/deps/*.ipk || true'
            echo 'fi'
            echo ''
            echo 'echo "Installing sing-box 1.13.13..."'
            echo 'opkg install packages/sing-box_1.13.13_x86_64.ipk'
            echo ''
            echo 'echo "Installing luci-app-homeproxy..."'
            echo 'opkg install packages/luci-app-homeproxy_*.ipk'
            echo 'opkg install packages/luci-i18n-homeproxy-zh-cn_*.ipk'
            echo ''
            echo 'echo "Setting LuCI language to Simplified Chinese..."'
            echo "uci set luci.main.lang='zh_cn'"
            echo 'uci commit luci'
            echo ''
            echo '/etc/init.d/rpcd restart 2>/dev/null || true'
            echo '/etc/init.d/uhttpd restart 2>/dev/null || true'
            echo ''
            echo 'echo "Done."'
          } > "$BUNDLE_DIR/install.sh"
          chmod +x "$BUNDLE_DIR/install.sh"

          rm -f artifacts/*.zip
          zip -qr "artifacts/homeproxy-${RELEASE_VERSION}-x86_64.zip" "$BUNDLE_DIR"

      - name: Create release notes
        env:
          RELEASE_DESCRIPTION: ${{ inputs.release_description }}
        run: |
          set -euo pipefail

          {
            echo "编译时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "Release description："
            if [ -n "$RELEASE_DESCRIPTION" ]; then
              printf '%s\n' "$RELEASE_DESCRIPTION"
            fi
          } > release_body.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          git tag -f "$RELEASE_VERSION"
          git push -f origin "$RELEASE_VERSION"

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release delete "$RELEASE_VERSION" --yes --cleanup-tag
            git tag -f "$RELEASE_VERSION"
            git push -f origin "$RELEASE_VERSION"
          fi

          assets=(artifacts/homeproxy-${RELEASE_VERSION}-x86_64.zip)

          gh release create "$RELEASE_VERSION" \
            "${assets[@]}" \
            --title "$RELEASE_VERSION" \
            --notes-file release_body.md
