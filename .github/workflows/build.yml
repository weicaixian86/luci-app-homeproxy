name: Build and Release IPK

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version, for example v2.0.1'
        required: true
        default: 'v2.0.1'
      release_description:
        description: 'Release description'
        required: false
        default: ''
      openwrt_version:
        description: 'OpenWrt 24.10 release version'
        required: true
        default: '24.10.0'
      sdk_url:
        description: 'OpenWrt SDK URL'
        required: true
        default: 'https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      TARGET: x86/64
      PACKAGE_NAME: luci-app-homeproxy

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl xz-utils zstd

      - name: Download OpenWrt SDK
        env:
          SDK_URL: ${{ inputs.sdk_url }}
        run: |
          set -euo pipefail

          SDK_FILE="${SDK_URL##*/}"

          if [ -z "$SDK_FILE" ]; then
            echo "Invalid OpenWrt SDK URL."
            exit 1
          fi

          curl -fsSLO "$SDK_URL"
          mkdir -p sdk
          tar --strip-components=1 -C sdk -xaf "$SDK_FILE"

      - name: Prepare package
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='sdk' \
            --exclude='artifacts' \
            --exclude='openwrt-sdk-*.tar.*' \
            ./ ./sdk/package/${PACKAGE_NAME}/

      - name: Update feeds
        working-directory: sdk
        run: |
          set -euo pipefail

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile IPK
        working-directory: sdk
        run: |
          set -euo pipefail

          make defconfig
          make package/${PACKAGE_NAME}/compile V=s -j"$(nproc)"

          mkdir -p ../artifacts
          IPK_FILE="$(find bin/packages -type f -name "${PACKAGE_NAME}_*.ipk" | head -n1)"

          if [ -z "$IPK_FILE" ]; then
            echo "No IPK file produced."
            exit 1
          fi

          cp "$IPK_FILE" "../artifacts/${PACKAGE_NAME}_${{ inputs.release_version }}.ipk"

      - name: Create release notes
        env:
          RELEASE_DESCRIPTION: ${{ inputs.release_description }}
        run: |
          set -euo pipefail

          {
            echo "编译时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "Release description："
            if [ -n "$RELEASE_DESCRIPTION" ]; then
              printf '%s\n' "$RELEASE_DESCRIPTION"
            fi
          } > release_body.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail

          git tag -f "$RELEASE_VERSION"
          git push -f origin "$RELEASE_VERSION"

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release delete "$RELEASE_VERSION" --yes --cleanup-tag
            git tag -f "$RELEASE_VERSION"
            git push -f origin "$RELEASE_VERSION"
          fi

          gh release create "$RELEASE_VERSION" \
            "artifacts/${PACKAGE_NAME}_${RELEASE_VERSION}.ipk" \
            --title "$RELEASE_VERSION" \
            --notes-file release_body.md
